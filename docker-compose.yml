services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kammer_kompass
      POSTGRES_USER: kammer_kompass
      POSTGRES_PASSWORD: kammer_kompass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kammer_kompass -d kammer_kompass"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build:
      context: ./backend
    environment:
      HTTP_ADDR: ":8080"
      LOG_LEVEL: "info"
      DATABASE_URL: "postgres://kammer_kompass:kammer_kompass@postgres:5432/kammer_kompass?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      SERVER_SECRET_SALT: "${SERVER_SECRET_SALT}"
      # base64 32 byte keys
      SESSION_AUTH_KEY: "${SESSION_AUTH_KEY}"
      SESSION_ENC_KEY: "${SESSION_ENC_KEY}"
      SESSION_SECURE: "${SESSION_SECURE:-false}"
      BOOTSTRAP_SUPER_ADMIN: "${BOOTSTRAP_SUPER_ADMIN:-true}"
      BOOTSTRAP_SUPER_ADMIN_PASSWORD: "${BOOTSTRAP_SUPER_ADMIN_PASSWORD:-testtesttesttest}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}"
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8080"
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
